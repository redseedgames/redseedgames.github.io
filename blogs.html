    <script>
      $(document).ready(function () {
        // Add smooth scrolling to all links
        $("a").on("click", function (event) {
          // Make sure this.hash has a value before overriding default behavior
          if (this.hash !== "") {
            // Prevent default anchor click behavior
            event.preventDefault();

            // Store hash
            var hash = this.hash;

            // Using jQuery's animate() method to add smooth page scroll
            // The optional number (800) specifies the number of milliseconds it takes to scroll to the specified area
            $("html, body").animate(
              {
                scrollTop: $(hash).offset().top,
              },
              800,
              function () {
                // Add hash (#) to URL when done scrolling (default click behavior)
                window.location.hash = hash;
              }
            );
          } // End if
        });
      });
    </script>

    <!--Script for newsletter subscription-->
    <script>
      $(document).ready(function () {
        $("#subscribeButton").click(function () {
          //Fetching email address from the input field
          var email = document.getElementById("usr").value;

          //Validating the fetched email address
          var mailformat = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
          if (email.match(mailformat)) {
            //Sending request to server
            $.post(
              "subscribe.php",
              {
                email: email,
              },
              function (data, status) {
                var messageData = JSON.parse(data);
                document.getElementById("usr").value = "";
                document.getElementById("usr").placeholder =
                  messageData["message"];
              }
            );
          } else {
            document.getElementById("usr").value = "";
            document.getElementById("usr").placeholder =
              "Please Enter Valid Email Address";
          }
        });
      });
    </script>

    <script>
      if (!window.RedseedBlogFeed) {
        window.RedseedBlogFeed = (function () {
          function truncateWords(text, maxWords) {
            var words = text.split(/\s+/).filter(Boolean);
            return words.length <= maxWords
              ? text
              : words.slice(0, maxWords).join(" ") + "…";
          }
          return {
            extractExcerpt: function (html, options) {
              options = options || {};
              var maxWords = options.maxWords || 40;
              if (!html) return "";
              if (html.indexOf("<") === -1) {
                return truncateWords(html.replace(/\s+/g, " ").trim(), maxWords);
              }
              var doc = new DOMParser().parseFromString(html, "text/html");
              doc.querySelectorAll("img, script, style").forEach(function (el) {
                el.remove();
              });
              var paragraphs = doc.body.querySelectorAll("p");
              for (var i = 0; i < paragraphs.length; i++) {
                var text = (paragraphs[i].textContent || "")
                  .replace(/\s+/g, " ")
                  .trim();
                if (text.length >= 20) return truncateWords(text, maxWords);
              }
              var fallback = (doc.body.textContent || "")
                .replace(/\s+/g, " ")
                .trim();
              return fallback ? truncateWords(fallback, maxWords) : "";
            },
            extractLargeImage: function (html) {
              var imgTag = new DOMParser()
                .parseFromString(html, "text/html")
                .querySelector("img");
              return imgTag ? imgTag.src.replace(/s72-c/, "s600") : null;
            },
          };
        })();
      }

      const postsPerPage = 5; // Number of posts per page
      let currentPage = 1; // Start at page 1
      let totalPosts = 0; // Total number of posts

      // Fetch the total number of posts and display the paginated list
      function fetchTotalPosts() {
        const feedUrl = `https://redseedgames.blogspot.com/feeds/posts/default?alt=json-in-script&callback=handleTotalPosts`;

        const script = document.createElement("script");
        script.src = feedUrl;
        document.body.appendChild(script);
      }

      // Handle the response to get total posts
      function handleTotalPosts(data) {
        totalPosts = data.feed.entry.length;
        displayPage(currentPage); // Display the first page
        setupPagination();
      }

      // Fetch and display the posts for the current page
      function displayPage(page) {
        const startIndex = (page - 1) * postsPerPage;
        const feedUrl = `https://redseedgames.blogspot.com/feeds/posts/default?start-index=${
          startIndex + 1
        }&max-results=${postsPerPage}&alt=json-in-script&callback=handlePagePosts`;

        const script = document.createElement("script");
        script.src = feedUrl;
        document.body.appendChild(script);
      }

      // Handle the posts for the current page
      function handlePagePosts(data) {
        const postList = document.getElementById("blog-list");
        postList.innerHTML = ""; // Clear the list before adding new posts

        const posts = data.feed.entry;
        posts.forEach((post) => {
          const title = post.title.$t;
          const postId = post.id.$t.split("post-")[1]; // Extract post ID
        //   const link = post.link.find((l) => l.rel === "alternate").href;
          const link = `blog.html?postId=${postId}`;
          const summary = post.summary ? post.summary.$t : "";
          const content = post.content ? post.content.$t : "";
          const excerptSource = summary || content;
          const publishedDate = formatPublishedDate(post.published.$t);

          let imgSrc = "";
          imgSrc =
            RedseedBlogFeed.extractLargeImage(content) ||
            "https://via.placeholder.com/300x200?text=No+Image";

          // Add the post to the list
          const postHtml = `
                          <div class="col-md-12 blog-post" style="background-color: rgba(0, 0, 0, 0.5); padding: 10px">
                            <a href="${link}" target="_blank">
                                <h5 style="font-family: binary; text-transform: uppercase;">${title}</h5>
                                <center>
                                    <img src="${imgSrc}" alt="${title}" class='img-fluid'>
                                </center>
                            </a>
                            <p style="color: grey;">${publishedDate}</p>
                            <p style="color: white;">${RedseedBlogFeed.extractExcerpt(excerptSource)}</p>
                          </div>`;
          postList.innerHTML += postHtml;
        });

        if (window.RedseedGameLinks) {
          RedseedGameLinks.linkGameNamesInElement(postList);
        }
      }

      // Format the published date
      function formatPublishedDate(publishedDate) {
        const date = new Date(publishedDate);
        const options = { year: "numeric", month: "long", day: "numeric" };
        return date.toLocaleDateString(undefined, options);
      }

      // Setup the pagination navigation
      function setupPagination() {
        const totalPages = Math.ceil(totalPosts / postsPerPage);
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = ""; // Clear the pagination

        for (let page = 1; page <= totalPages; page++) {
          const pageLink = document.createElement("a");
          pageLink.href = "#";
          pageLink.textContent = page;
          pageLink.className = page === currentPage ? "active" : "";
          pageLink.addEventListener("click", (e) => {
            e.preventDefault();
            currentPage = page;
            displayPage(currentPage);
            setupPagination();
          });
          pagination.appendChild(pageLink);
        }
      }

      // Initial load
      fetchTotalPosts();
      if (window.RedseedGameLinks) {
        RedseedGameLinks.renderGamesPromo("blog-games-promo");
      }
    </script>
